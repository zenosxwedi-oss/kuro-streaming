kind = "mobile"
previewPath = "/"
title = "Kuro Streaming"
version = "1.0.0"
id = "artifacts/kuro"
router = "expo-domain"

[[services]]
name = "expo"
ensurePreviewReachable = "/status"
paths = [ "/" ]
localPort = 25441

[services.development]
run = "pnpm --filter @workspace/kuro run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/kuro", "run", "build" ]
run = [ "pnpm", "--filter", "@workspace/kuro", "run", "serve" ]

[services.env]
PORT = "25441"
BASE_PATH = "/"
